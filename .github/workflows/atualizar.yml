name: ⚽ Atualizar Gols Copa 2026

on:
  schedule:
    # Roda 1 vez por hora. O horário do cron é UTC.
    # O minuto 17 evita o pico do início da hora no GitHub Actions.
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  atualizar-gols:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Baixar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚽ Gerar base limpa de gols
        run: python update_goals.py

      - name: 📤 Commitar e publicar no GitHub
        run: |
          git config user.name  "GitHub Actions [Bot]"
          git config user.email "actions@github.com"
          git add index.html gols.csv gols.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados — nenhum commit necessário."
          else
            git commit -m "⚽ Atualizar base de gols — $(date -u '+%d/%m/%Y %H:%M') UTC"
            git push
          fi
